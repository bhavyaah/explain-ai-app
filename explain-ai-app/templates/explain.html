<!DOCTYPE html>
<html>
<head>
    <title>ExplainAI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .container {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 20px;
            width: 400px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 5px;
        }

        .tagline {
            font-size: 14px;
            color: gray;
            margin-bottom: 20px;
        }

        input, select {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        button {
            background: #667eea;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        button:hover {
            background: #5a67d8;
        }

        #loading {
            margin-top: 10px;
            display: none;
            color: #667eea;
        }

        .result {
            margin-top: 20px;
            text-align: left;
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        footer {
            margin-top: 15px;
            font-size: 12px;
            color: gray;
        }
    </style>

    <script>
        function showLoading() {
            document.getElementById("loading").style.display = "block";
        }
    </script>
</head>

<body>

<div class="container">
    <h1>ExplainAI 🤓</h1>
    <p class="tagline">Understand anything in seconds</p>

    <form action="/explain" method="post" onsubmit="showLoading()">
        <input type="text" name="topic" placeholder="Enter topic..." required>

        <select name="level">
            <option value="5 years old">Like I'm 5</option>
            <option value="student">Student level</option>
            <option value="expert">Expert level</option>
        </select>

        <button type="submit">✨ Explain</button>
    </form>

    <p id="loading">⏳ Thinking...</p>

    {% if result %}
    <div class="result">
        <strong>Explanation:</strong>
        <p>{{ result }}</p>
    </div>
    {% endif %}

    <footer>
        Built by Bhavya 🚀
    </footer>
</div>

</body>
</html>
